<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard IoT (Simulado)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-4">
  <h2 class="text-center mb-4">Dashboard de Monitoreo IoT </h2>

  <!-- Selectores -->
  <div class="row mb-4">
    <div class="col-md-6">
      <label for="maquinaSelect" class="form-label">Selecciona Máquina:</label>
      <select id="maquinaSelect" class="form-select">
        <option value="maquina1">Variaxis-IIoT11X</option>
        <option value="maquina2">Máquina 2</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="fechaSelect" class="form-label">Selecciona Fecha:</label>
      <input type="date" id="fechaSelect" class="form-control" value="2025-07-28">
    </div>
  </div>

  <!-- Cards para gráficas -->
  <div class="row" id="cardsContainer"></div>
</div>

<script>
const cardsContainer = document.getElementById('cardsContainer');
let charts = [];

const variables = [
  { id: 'temp', label: 'Temperatura (°C)', color: 'rgba(255, 99, 132, 1)' },
  { id: 'hum', label: 'Humedad (%)', color: 'rgba(54, 162, 235, 1)' },
  { id: 'bat', label: 'Voltaje (V)', color: 'rgba(255, 206, 86, 1)' },
  { id: 'corr', label: 'Corriente (A)', color: 'rgba(75, 192, 192, 1)' },
  { id: 'volt', label: 'Voltaje (V)', color: 'rgba(153, 102, 255, 1)' },
  { id: 'pot', label: 'Potencia (W)', color: 'rgba(255, 159, 64, 1)' }
];

function crearCard(idCanvas, titulo) {
  return `
    <div class="col-md-6 mb-4">
      <div class="card shadow-sm">
        <div class="card-header fw-bold">${titulo}</div>
        <div class="card-body">
          <canvas id="${idCanvas}" height="150"></canvas>
        </div>
      </div>
    </div>
  `;
}

// Inicializa los cards
function inicializarGraficas() {
  cardsContainer.innerHTML = variables.map(v => crearCard('graf_' + v.id, v.label)).join('');
  charts.forEach(c => c.destroy());
  charts = [];

  variables.forEach(v => {
    const ctx = document.getElementById('graf_' + v.id).getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],  // Horas
        datasets: [{
          label: v.label,
          data: [],
          borderColor: v.color,
          fill: false,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        animation: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            title: { display: true, text: 'Hora' }
          },
          y: {
            beginAtZero: true
          }
        }
      }
    });
    charts.push(chart);
  });
}

// Generar un punto de datos aleatorio
function generarDatos() {
  const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

  const nuevosDatos = {
    temp: (Math.random() * 10 + 20).toFixed(1),
    hum: (Math.random() * 30 + 40).toFixed(1),
    bat: (Math.random() * 0.5 + 3.3).toFixed(2),
    corr: (Math.random() * 0.5 + 1.0).toFixed(2),
    volt: (Math.random() * 10 + 215).toFixed(1),
    pot: (Math.random() * 100 + 200).toFixed(0)
  };

  variables.forEach((v, i) => {
    const chart = charts[i];
    if (chart.data.labels.length >= 10) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }
    chart.data.labels.push(hora);
    chart.data.datasets[0].data.push(nuevosDatos[v.id]);
    chart.update();
  });
}

// Inicializa y actualiza cada 5 segundos
document.getElementById('maquinaSelect').addEventListener('change', () => {
  inicializarGraficas();
});
document.getElementById('fechaSelect').addEventListener('change', () => {
  inicializarGraficas();
});

// Primera carga
inicializarGraficas();
setInterval(generarDatos, 5000);
</script>

</body>
</html>
